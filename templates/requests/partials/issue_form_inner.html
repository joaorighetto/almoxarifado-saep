{% csrf_token %}
<fieldset>
  <legend>Dados da retirada</legend>
  {{ form.as_p }}
</fieldset>

<fieldset>
  <legend>Itens</legend>
  <div id="issue-items-formset" data-formset-prefix="{{ formset.prefix }}">
    {{ formset.management_form }}
    <div id="issue-items-list">
      {% for f in formset %}
        <div class="issue-item-form" style="border:1px solid #ddd; padding:10px; margin:10px 0;">
          {% include "requests/partials/issue_item_form_fields.html" with form=f %}
        </div>
      {% endfor %}
    </div>

    <template id="issue-item-empty-form-template">
      <div class="issue-item-form" style="border:1px solid #ddd; padding:10px; margin:10px 0;">
        {% include "requests/partials/issue_item_form_fields.html" with form=formset.empty_form %}
      </div>
    </template>
  </div>
</fieldset>

<button type="submit">Salvar</button>
